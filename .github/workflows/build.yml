name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: '${{ github.workspace }}/theos'

      - name: Download SDKs
        run: |
          mv -v $THEOS/sdks $THEOS/sdks2
          git clone --depth 1 https://github.com/xybp888/iOS-SDKs.git $THEOS/sdks

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Generate timestamp version
        id: version
        run: |
          VERSION=$(date +%s)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build the tweak
        run: |
          make clean package FINALPACKAGE=1

      - name: Create Release & Upload File
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Ventana ${{ steps.version.outputs.version }}
          generate_release_notes: false
          files: ./packages/*.deb
