name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: '${{ github.workspace }}/theos'

      - name: Download SDKs
        run: |
          mv -v $THEOS/sdks $THEOS/sdks2
          echo git clone --depth 1 https://github.com/xybp888/iOS-SDKs.git $THEOS/sdks

      - name: Select Xcode
        run: |
          ls -lah /Applications/
          exit 1
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Build the tweak
        run: |
          make clean package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetroLockScreen-deb
          path: packages/*.deb
